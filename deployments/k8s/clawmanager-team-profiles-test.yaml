# Test-only override for validating local ClawManager Team profile UI/injection.
# Apply the normal manifest first, then apply this file:
#
#   kubectl apply -f deployments/k8s/clawmanager.yaml
#   docker build -t clawmanager:team-profiles-test .
#   kubectl apply -f deployments/k8s/clawmanager-team-profiles-test.yaml
#
# This changes only the ClawManager app image. OpenClaw/Hermes member images
# remain configured by system settings and the base manifest.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: clawmanager-app
  namespace: clawmanager-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: clawmanager-app
  template:
    metadata:
      labels:
        app: clawmanager-app
    spec:
      serviceAccountName: clawmanager-app
      containers:
        - name: clawmanager-app
          image: clawmanager:team-profiles-test
          imagePullPolicy: IfNotPresent
          ports:
            - name: https
              containerPort: 8443
            - name: proxy
              containerPort: 9001
          env:
            - name: SERVER_ADDRESS
              value: ":9001"
            - name: SERVER_MODE
              value: "release"
            - name: DB_HOST
              value: "mysql"
            - name: DB_PORT
              value: "3306"
            - name: DB_USER
              value: "clawmanager"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: clawmanager-secrets
                  key: mysql-password
            - name: DB_NAME
              value: "clawmanager"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: clawmanager-secrets
                  key: jwt-secret
            - name: OBJECT_STORAGE_ENDPOINT
              value: "minio.clawmanager-system.svc.cluster.local:9000"
            - name: OBJECT_STORAGE_REGION
              value: ""
            - name: OBJECT_STORAGE_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: clawmanager-secrets
                  key: minio-access-key
            - name: OBJECT_STORAGE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: clawmanager-secrets
                  key: minio-secret-key
            - name: OBJECT_STORAGE_BUCKET
              value: "clawmanager-skills"
            - name: OBJECT_STORAGE_USE_SSL
              value: "false"
            - name: OBJECT_STORAGE_BASE_PATH
              value: "skills"
            - name: OBJECT_STORAGE_FORCE_PATH_STYLE
              value: "true"
            - name: K8S_MODE
              value: "incluster"
            - name: K8S_NAMESPACE
              value: "clawmanager"
            - name: K8S_STORAGE_CLASS
              value: "manual"
            - name: K8S_PV_HOST_PATH_PREFIX
              value: "/data/clawreef"
            - name: CLAWMANAGER_WORKSPACE_ARCHIVE_MAX_MIB
              value: "500"
            - name: CLAWMANAGER_TEAM_REDIS_URL
              value: "redis://clawmanager-team-redis.clawmanager-system.svc.cluster.local:6379/0"
            - name: CLAWMANAGER_TEAM_MANAGER_BASE_URL
              value: "http://clawmanager-gateway.clawmanager-system.svc.cluster.local:9001"
            - name: SKILL_SCANNER_ENABLED
              value: "true"
            - name: SKILL_SCANNER_BASE_URL
              value: "http://skill-scanner.clawmanager-system.svc.cluster.local:8000"
            - name: SKILL_SCANNER_TIMEOUT_SECONDS
              value: "120"
            - name: SKILL_SCANNER_NAMESPACE
              value: "clawmanager-system"
            - name: SKILL_SCANNER_DEPLOYMENT
              value: "skill-scanner"
          volumeMounts:
            - name: tls-cert
              mountPath: /var/run/clawreef-tls
              readOnly: true
          readinessProbe:
            httpGet:
              scheme: HTTPS
              path: /healthz
              port: https
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              scheme: HTTPS
              path: /healthz
              port: https
            initialDelaySeconds: 30
            periodSeconds: 20
      volumes:
        - name: tls-cert
          secret:
            secretName: clawmanager-tls
            optional: true
